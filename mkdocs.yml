site_name: OpenArc
site_description: Inference engine for Intel devices powered by OpenVINO
repo_url: https://github.com/SearchSavior/OpenArc
repo_name: SearchSavior/OpenArc

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Features: features.md
  - Quickstart:
    - quickstart/index.md
    - Linux: quickstart/linux.md
    - Windows: quickstart/windows.md
    - Docker: quickstart/docker.md
  - OpenArc CLI:
    - cli/index.md
    - openarc add: cli/add.md
    - openarc list: cli/list.md
    - openarc serve: cli/serve.md
    - openarc load: cli/load.md
    - openarc status: cli/status.md
    - openarc bench: cli/bench.md
    - openarc tool: cli/tool.md
  - Model Sources:
    - models/index.md
    - LLMs: models/llms.md
    - VLMs: models/vlms.md
    - Whisper: models/whisper.md
    - Kokoro: models/kokoro.md
    - Embedding: models/embedding.md
    - Reranker: models/reranker.md
  - Converting Models to OpenVINO IR: converting.md
  - Learning Resources: resources.md
  - Acknowledgments: acknowledgments.md
  - Codebase Documentation:
    - architecture/index.md
    - Server: architecture/server.md
    - Model Registration: architecture/model_registration.md
    - Worker Orchestration: architecture/worker_orchestration.md
    - Inference: architecture/inference.md
    - OpenVINO IR: architecture/openvino_ir.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
